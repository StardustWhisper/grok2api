services:
  grok2api:
    container_name: grok2api
    image: ghcr.io/tqzhr/grok2api:latest
    ports:
      - "8000:8000"
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: INFO
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      SERVER_WORKERS: 1
      SERVER_STORAGE_TYPE: local
      SERVER_STORAGE_URL: ""
      STORAGE_WAIT_TIMEOUT: 60
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    shm_size: "1gb"
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os,urllib.request; p=os.getenv('SERVER_PORT','8000'); urllib.request.urlopen(f'http://127.0.0.1:{p}/health', timeout=2).read();"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
